env:
  NODE_VERSION: 20
  APP_NAME: cron-ticker

jobs:
  build:
      runs-on: ubuntu-latest
      env:
        BUILD_DIR: dist
      steps:
        - uses: actions/checkout@v4
        - name: Show variables
          run: |
            echo "NODE_VERSION: ${{ env.NODE_VERSION }}"
            echo "APP_NAME: ${{ env.APP_NAME }}"
            echo "BUILD_DIR: ${{ env.BUILD_DIR }}"

        - name: Build
          run: npm run build
          env:
            APP_VERSION: '2.0.0'
